services:
  app:
    image: ${BACKEND_IMAGE:-ghcr.io/emrullaharkun/mybooktracker-backend:latest}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/mybooktracker
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_JWT_COOKIE_SECURE=${APP_JWT_COOKIE_SECURE:-true}
      - APP_CORS_ORIGINS=${APP_CORS_ORIGINS}
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mybooktracker
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/emrullaharkun/mybooktracker-frontend:latest}
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_CERT_DIR:-./ops/ssl}:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:

services:
  app:
    image: ghcr.io/emrullaharkun/mybooktracker-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/mybooktracker
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_JWT_COOKIE_SECURE=${APP_JWT_COOKIE_SECURE:-false}
      - APP_CORS_ORIGINS=${APP_CORS_ORIGINS}
      - APP_DISCOVERY_PROVIDER=${APP_DISCOVERY_PROVIDER:-google-books}
      - APP_GOOGLE_BOOKS_API_KEY=${APP_GOOGLE_BOOKS_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mybooktracker
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    image: ghcr.io/emrullaharkun/mybooktracker-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always

volumes:
  postgres_data:

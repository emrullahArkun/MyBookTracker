spring.jpa.hibernate.ddl-auto=validate

# Dev DB
spring.datasource.url=jdbc:postgresql://localhost:5440/mybooktracker
spring.datasource.username=postgres
spring.datasource.password=postgres

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Dev bootstrap
app.dev.admin.email=${APP_DEV_ADMIN_EMAIL:admin@example.com}
app.dev.admin.password=${APP_DEV_ADMIN_PASSWORD:AdminPassword123}

# Cookie not secure in dev (HTTP, not HTTPS)
app.jwt.cookie-secure=false

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
